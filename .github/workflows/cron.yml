name: LangMe Notification Cron

on:
  schedule:
    # GitHub Actions uses UTC time. 
    # Vietnam is UTC+7. 
    # 9:00 AM VN = 2:00 AM UTC
    - cron: '0 2 * * *'
    # 12:00 PM VN = 5:00 AM UTC
    - cron: '0 5 * * *'
    # 4:00 PM VN = 9:00 AM UTC
    - cron: '0 9 * * *'
    # 9:00 PM VN = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping_api:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Cron API
        run: |
          curl -sS -X GET "${{ secrets.CRON_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
